project:
  name: c3_multimodal_yolo
  seed: 3407
  output_dir: runs/c3_multimodal_yolo

dataset:
  processed_root: dataset
  image_size: [768, 1280]
  num_workers: 4
  cache_images: false
  max_detections_per_image: 100
  class_names:
    - buoy
    - ship
    - boat
    - vessel
    - kayak
  radar:
    image_channels: 4
    range_clip: 300.0
    power_clip: 40.0
    doppler_clip: 15.0
    use_uv_projection: true

augmentation:
  hsv_gain: [0.015, 0.7, 0.4]
  horizontal_flip_prob: 0.5
  mosaic_prob: 0.0
  mixup_prob: 0.0
  random_affine_prob: 0.0

model:
  num_classes: 5
  width_mult: 1.0
  depth_mult: 1.0
  strides: [4, 8, 16]
  feature_dims: [128, 256, 512]
  norm_eps: 0.001
  norm_momentum: 0.03
  dehaze:
    enabled: true
    hidden_dim: 32
    aux_loss_weight: 0.03
  fusion:
    enabled: true
    hidden_dim: 256
    attention_heads: 4
    token_pool: 8
  neck:
    out_channels: 256
  head:
    stacked_convs: 2
    feat_channels: 256

train:
  epochs: 120
  batch_size: 8
  accumulate: 1
  mixed_precision: true
  clip_grad_norm: 10.0
  ema_decay: 0.9998
  log_interval: 20
  eval_interval: 1
  checkpoint_interval: 5

optimizer:
  type: adamw
  lr: 0.0002
  weight_decay: 0.05
  betas: [0.9, 0.999]

scheduler:
  type: cosine
  warmup_epochs: 3
  min_lr_ratio: 0.05

loss:
  cls_weight: 1.0
  obj_weight: 1.0
  box_weight: 5.0
  iou_type: ciou
  focal_gamma: 2.0
  focal_alpha: 0.25
  label_smoothing: 0.0

inference:
  conf_threshold: 0.25
  iou_threshold: 0.60
  max_detections: 100
